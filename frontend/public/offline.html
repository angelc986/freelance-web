<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — TurnoGO</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F8FAFC;
      color: #1E293B;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #2563EB, #1D4ED8);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    }
    .icon span {
      color: white;
      font-size: 32px;
      font-weight: bold;
    }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { font-size: 14px; color: #64748B; max-width: 280px; line-height: 1.5; }
    .btn {
      margin-top: 24px;
      padding: 12px 24px;
      background: #2563EB;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #1D4ED8; }
    .btn:active { background: #1E40AF; }
    .footer { margin-top: 32px; font-size: 12px; color: #94A3B8; }
  </style>
</head>
<body>
  <div class="icon"><span>T</span></div>
  <h1>Sin conexión</h1>
  <p>Parece que no tienes internet. TurnoGO necesita conexión para funcionar. Vuelve a intentar cuando estés conectado.</p>
  <button class="btn" onclick="window.location.reload()">Reintentar</button>
  <div class="footer">TurnoGO</div>
</body>
</html>
