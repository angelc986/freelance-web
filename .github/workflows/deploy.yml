name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Gate: only proceed if CI passed
  gate:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check CI status
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual deploy - bypassing CI gate."
            echo "proceed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            echo "CI passed. Proceeding with Vercel deploy."
            echo "proceed=true" >> $GITHUB_OUTPUT
          else
            echo "::error::CI FAILED. Deploy BLOCKED."
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

  # Vercel: Deploy via CLI
  deploy-frontend:
    name: Deploy Vercel
    needs: [gate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.gate.outputs.proceed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: *** secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN not set. Deploy skipped."
            exit 0
          fi
          cd frontend
          echo "Deploying to Vercel..."
          npx vercel deploy --prod --token "***" --yes
          echo "::notice::Vercel deploy complete."

  # Summary
  deploy-summary:
    name: Deploy Summary
    needs: [deploy-frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Deploy Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CI Gate | ${{ needs.gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Vercel | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Railway | native (CI-gated auto-deploy) |" >> $GITHUB_STEP_SUMMARY
