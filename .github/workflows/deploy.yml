name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Gate: only proceed if CI passed ─────────────────────
  gate:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check CI status
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual deploy — bypassing CI gate."
            echo "proceed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            echo "CI passed. Proceeding."
            echo "proceed=true" >> $GITHUB_OUTPUT
          else
            echo "::error::CI FAILED. Deploy BLOCKED."
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

  # ── Vercel: Deploy via Deploy Hook (bypasses ignoreCommand) ──
  deploy-frontend:
    name: Deploy Vercel
    needs: [gate]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: needs.gate.outputs.proceed == 'true'
    steps:
      - name: Trigger Vercel Deploy
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "::warning::VERCEL_DEPLOY_HOOK not set. Deploy skipped."
            exit 0
          fi
          echo "Triggering Vercel deploy via Deploy Hook..."
          RESPONSE=$(curl -sf -X POST "$VERCEL_DEPLOY_HOOK")
          echo "$RESPONSE"
          echo "::notice::Vercel deploy triggered."

  # Railway: Native auto-deploy with Wait for CI enabled
  deploy-backend:
    name: Railway (Native)
    needs: [gate]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    if: needs.gate.outputs.proceed == 'true'
    steps:
      - name: Railway Status
        run: |
          echo "Railway auto-deploys natively with 'Wait for CI' enabled."
          echo "Monitor at: https://railway.app/project"

  # ── Summary ────────────────────────────────────────────
  deploy-summary:
    name: Deploy Summary
    needs: [deploy-frontend, deploy-backend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🚀 Deploy Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CI Gate | ${{ needs.gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Vercel | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Railway | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
