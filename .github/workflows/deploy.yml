name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Gate: only proceed if CI passed ─────────────────────
  gate:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check CI status
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual deploy triggered — bypassing CI gate."
            echo "proceed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            echo "CI passed (${{ github.event.workflow_run.id }}). Proceeding."
            echo "proceed=true" >> $GITHUB_OUTPUT
          else
            echo "::error::CI FAILED (conclusion=${{ github.event.workflow_run.conclusion }}). Deploy BLOCKED."
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

  # ── Vercel: Trigger via Deploy Hook ────────────────────
  deploy-frontend:
    name: Deploy Vercel
    needs: [gate]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: needs.gate.outputs.proceed == 'true'
    steps:
      - name: Trigger Vercel Deploy
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "::warning::VERCEL_DEPLOY_HOOK not set. Create it:"
            echo "  Vercel Dashboard → Settings → Git → Deploy Hooks → Create"
            echo "  Name: GitHub Actions | Branch: main"
            echo "  Add URL as VERCEL_DEPLOY_HOOK in GitHub Secrets"
            exit 0
          fi
          echo "Deploying to Vercel..."
          curl -sf -X POST "$VERCEL_DEPLOY_HOOK"
          echo "::notice::Vercel deploy triggered. Check: https://vercel.com/angelc986/freelance-web/deployments"

  # ── Railway: Trigger via Webhook ───────────────────────
  deploy-backend:
    name: Deploy Railway
    needs: [gate]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: needs.gate.outputs.proceed == 'true'
    steps:
      - name: Trigger Railway Deploy
        env:
          RAILWAY_DEPLOY_HOOK: ${{ secrets.RAILWAY_DEPLOY_HOOK }}
        run: |
          if [ -z "$RAILWAY_DEPLOY_HOOK" ]; then
            echo "::warning::RAILWAY_DEPLOY_HOOK not set. Create it:"
            echo "  Railway Dashboard → Service → Settings → Webhooks → Create"
            echo "  Add webhook URL as RAILWAY_DEPLOY_HOOK in GitHub Secrets"
            echo "  (Auto-deploy should already be OFF)"
            exit 0
          fi
          echo "Deploying to Railway..."
          RESPONSE=$(curl -s -w "%{http_code}" -o /dev/null -X POST "$RAILWAY_DEPLOY_HOOK")
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "201" ] || [ "$RESPONSE" = "204" ]; then
            echo "::notice::Railway deploy triggered (HTTP $RESPONSE)."
          else
            echo "::warning::Railway webhook returned HTTP $RESPONSE"
          fi

  # ── Summary ────────────────────────────────────────────
  deploy-summary:
    name: Deploy Summary
    needs: [deploy-frontend, deploy-backend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🚀 Deploy Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CI Gate | ${{ needs.gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Vercel | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Railway | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Vercel:** https://freelance-web-beta.vercel.app" >> $GITHUB_STEP_SUMMARY
          echo "**Railway:** https://railway.app/project" >> $GITHUB_STEP_SUMMARY
