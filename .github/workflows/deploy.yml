name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Gate: only proceed if CI passed ─────────────────────
  gate:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check CI status
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual deploy — bypassing CI gate."
            echo "proceed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            echo "CI passed. Proceeding."
            echo "proceed=true" >> $GITHUB_OUTPUT
          else
            echo "::error::CI FAILED. Deploy BLOCKED."
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

  # ── Vercel: Deploy via CLI (full control, no race condition) ──
  deploy-frontend:
    name: Deploy Vercel
    needs: [gate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.gate.outputs.proceed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN not set. How to fix:"
            echo "  1. Vercel Dashboard → Settings → Tokens → Create"
            echo "  2. Name: GitHub Actions, Scope: Full Account"
            echo "  3. Add token as VERCEL_TOKEN in GitHub Secrets"
            echo "  4. Vercel Settings → Git → DISCONNECT repo (stops auto-deploy)"
            exit 0
          fi
          cd frontend
          echo "Deploying to Vercel production..."
          npx vercel deploy --prod --token "$VERCEL_TOKEN" --yes
          echo "::notice::Vercel deploy complete. https://freelance-web-beta.vercel.app"

  # ── Railway: Deploy via CLI ─────────────────────────────
  deploy-backend:
    name: Deploy Railway
    needs: [gate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.gate.outputs.proceed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN not set. How to fix:"
            echo "  1. Railway Dashboard → Settings → Tokens → Create"
            echo "  2. Add token as RAILWAY_TOKEN in GitHub Secrets"
            echo "  3. Make sure auto-deploy is OFF in Railway"
            exit 0
          fi
          cd backend
          npm install -g @railway/cli
          echo "Deploying to Railway..."
          railway up --service backend --detach
          echo "::notice::Railway deploy triggered. Check: https://railway.app/project"

  # ── Summary ────────────────────────────────────────────
  deploy-summary:
    name: Deploy Summary
    needs: [deploy-frontend, deploy-backend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🚀 Deploy Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CI Gate | ${{ needs.gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Vercel | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Railway | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
