name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  gate:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check CI status
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual deploy - bypassing CI gate."
            echo "proceed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            echo "CI passed."
            echo "proceed=true" >> $GITHUB_OUTPUT
          else
            echo "::error::CI FAILED."
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

  frontend-status:
    name: Vercel (Auto-deploy)
    needs: [gate]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    if: needs.gate.outputs.proceed == 'true'
    steps:
      - name: Status
        run: |
          echo "Vercel auto-deploys on push to freelance-web-beta.vercel.app"
          echo "No duplicate deploy needed - Git integration handles it."

  backend-status:
    name: Railway (Wait for CI)
    needs: [gate]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    if: needs.gate.outputs.proceed == 'true'
    steps:
      - name: Status
        run: |
          echo "Railway deploys natively with Wait for CI enabled."
          echo "Monitor at: https://railway.app/project"

  summary:
    name: Deploy Summary
    needs: [frontend-status, backend-status]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Deploy Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Method | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Vercel | Auto-deploy on push | ${{ needs.frontend-status.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Railway | Wait for CI | ${{ needs.backend-status.result }} |" >> $GITHUB_STEP_SUMMARY
